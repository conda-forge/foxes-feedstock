{% set name = "foxes" %}
{% set version = "1.7.1" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/FraunhoferIWES/foxes/archive/v{{ version }}.tar.gz
  sha256: e0b2a9c9722d9b8e78ac6a32321ec9232ec2ca8a1cdd5250b7803747b4dee8cc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - foxes_yaml = foxes.input.yaml.yaml:foxes_yaml
    - foxes_windio = foxes.input.yaml.windio.windio:foxes_windio

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61
  run:
    - python >={{ python_min }}
    - matplotlib-base >=3.8
    - numpy >=1.26
    - pandas >=2.0
    - xarray >=2023
    - netcdf4 >=1.0
    - scipy >=1.12
    - pyyaml >=4.0
    - cycler >=0.10
    - tqdm >=2.0
    - utm >=0.5

test:
  imports:
    - foxes
  requires:
    - python {{ python_min }}
    - pip
    - pytest >=7.0
  source_files:
    - tests
  commands:
    - pip check
    - pytest tests

about:
  home: https://github.com/FraunhoferIWES/foxes
  summary: Farm Optimization and eXtended yield Evaluation Software
  description: |
    The software foxes is a modular wind farm simulation and wake
    modelling toolbox which is based on engineering wake models. It
    has many applications, for example wind farm optimization,
    wind farm post-construction analysis, wake model studies, and
    wind farm simulations invoking complex model chains.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - SchmJo
